name: Weekly bulletin PDF

# The newsletter pipeline (nocashflow-bulletin-bot) pushes the Sunday deep dive
# as bulletins/weekly/latest.{en,tr}.html. This prints those two files to PDF
# with the runner's Chrome and commits them under fixed names, so the download
# links on the bulletin page always serve the latest issue — the previous
# week's PDF is overwritten automatically.
on:
  push:
    paths:
      - "bulletins/weekly/latest.en.html"
      - "bulletins/weekly/latest.tr.html"
  schedule:
    - cron: "30 20 * * 0"  # Sunday 20:30 UTC — fallback after the ~19:20 UTC bot push
  workflow_dispatch: {}    # allow manual runs from the Actions tab

permissions:
  contents: write

concurrency:
  group: weekly-pdf
  cancel-in-progress: false

jobs:
  print:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Print latest weekly bulletins to PDF
        run: |
          for lang in en tr; do
            google-chrome --headless --disable-gpu --no-sandbox \
              --no-pdf-header-footer --virtual-time-budget=10000 \
              --print-to-pdf="bulletins/weekly/latest.$lang.pdf" \
              "file://$PWD/bulletins/weekly/latest.$lang.html"
          done
          ls -la bulletins/weekly/*.pdf

      - name: Commit if the PDFs changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bulletins/weekly/latest.en.pdf bulletins/weekly/latest.tr.pdf
          if git diff --staged --quiet; then
            echo "No PDF changes."
          else
            git commit -m "chore(bulletin): refresh weekly PDF downloads [skip ci]"
            git push
          fi
