<script>
  /* build ticker + menu/forms, but run our own data loop */
  window.NCF.init({ ticker: ['vix','dxy','us10y','gold','brent','btc'], market: false });

  const $ = (id) => document.getElementById(id);
  function setKPI(valEl, chgEl, val, pct, suffix='', invert=false) {
    if (valEl && val != null) valEl.textContent = val.toFixed(2) + suffix;
    if (chgEl && pct != null) {
      const dir = invert ? (pct <= 0 ? 'up' : 'dn') : (pct >= 0 ? 'up' : 'dn');
      chgEl.textContent = (pct >= 0 ? '+' : '') + pct.toFixed(2) + '%';
      chgEl.className = 'stat-chg ' + dir;
    }
  }
  function spark(id, closes, up) { const el = $(id); if (el && closes) el.innerHTML = window.NCF.sparkline(closes, up); }

  async function loadMacro() {
    $('last-update').textContent = new Date().toLocaleTimeString('en-GB');

    const fg = await window.NCF.fetchFearGreed();
    if (fg) { $('m-fg').textContent = fg.value; const c = $('m-fg-c'); c.textContent = fg.label; c.className = 'stat-chg ' + (fg.value > 55 ? 'up' : fg.value < 35 ? 'dn' : 'neu'); }

    const vix = await window.NCF.fetchYahoo('^VIX');
    if (vix) { setKPI($('m-vix'), $('m-vix-c'), vix.last, vix.pct, '', true); spark('sp-vix', vix.closes, vix.pct <= 0); window.NCF.paint('vix', vix.last, vix.pct, { invert: true }); }

    const dxy = await window.NCF.fetchYahoo('DX-Y.NYB');
    if (dxy) {
      setKPI($('m-dxy'), $('m-dxy-c'), dxy.last, dxy.pct); spark('sp-dxy', dxy.closes, dxy.pct >= 0);
      window.NCF.paint('dxy', dxy.last, dxy.pct);
      $('sb-dxy').textContent = dxy.last.toFixed(2);
      const c = $('sb-dxy-c'); c.textContent = (dxy.pct >= 0 ? '+' : '') + dxy.pct.toFixed(2) + '%'; c.style.color = dxy.pct >= 0 ? 'var(--green)' : 'var(--red)';
    }

    let y10 = null, y2 = null;
    y10 = await window.NCF.fetchYahoo('^TNX');
    if (y10) { setKPI($('m-10y'), $('m-10y-c'), y10.last, y10.pct, '%'); spark('sp-10y', y10.closes, y10.pct >= 0); window.NCF.paint('us10y', y10.last, y10.pct); }

    y2 = await window.NCF.fetchYahoo('^IRX');
    if (y2) {
      setKPI($('m-2y'), $('m-2y-c'), y2.last, y2.pct, '%'); spark('sp-2y', y2.closes, y2.pct >= 0);
      if (y10) {
        const spread = y10.last - y2.last;
        $('m-spread').textContent = (spread >= 0 ? '+' : '') + spread.toFixed(2) + '%';
        const c = $('m-spread-c'); c.textContent = spread >= 0 ? 'Normal curve' : 'Inverted ⚠'; c.className = 'stat-chg ' + (spread >= 0 ? 'up' : 'dn');
      }
    }

    /* yield curve */
    const yields = [{l:'1M',v:5.3},{l:'3M',v:5.25},{l:'6M',v:5.1},{l:'2Y',v:y2?y2.last:3.9},{l:'5Y',v:4.1},{l:'10Y',v:y10?y10.last:4.4},{l:'30Y',v:4.6}];
    const mx = Math.max(...yields.map(y => y.v));
    const yc = $('yield-chart'); yc.innerHTML = '';
    yields.forEach(y => {
      const bar = document.createElement('div'); bar.className = 'yield-bar';
      bar.style.height = ((y.v / mx) * 100) + '%';
      bar.innerHTML = '<span class="v">' + y.v.toFixed(1) + '</span><span class="l">' + y.l + '</span>';
      yc.appendChild(bar);
    });
    const sp = (y10 ? y10.last : 4.4) - (y2 ? y2.last : 3.9);
    $('yield-note').textContent = '10Y–2Y spread: ' + (sp >= 0 ? '+' : '') + sp.toFixed(2) + '% — ' + (sp >= 0 ? 'Normal curve. No near-term recession signal.' : 'Inverted — historically a recession precursor.');

    /* M2 via FRED (proxied) */
    try {
      const url = 'https://fred.stlouisfed.org/graph/fredgraph.csv?id=M2SL&cosd=2025-01-01';
      const res = await fetch('https://corsproxy.io/?url=' + encodeURIComponent(url));
      const txt = await res.text();
      const rows = txt.trim().split('\n');
      const last = rows[rows.length - 1].split(','), prev = rows[rows.length - 2].split(',');
      const v = parseFloat(last[1]) / 1000, pv = parseFloat(prev[1]) / 1000;
      $('sb-m2').textContent = '$' + v.toFixed(1) + 'T';
      const c = $('sb-m2-c'); const chg = (v - pv) / pv * 100; c.textContent = (chg >= 0 ? '+' : '') + chg.toFixed(2) + '%'; c.style.color = chg >= 0 ? 'var(--green)' : 'var(--red)';
    } catch (e) { $('sb-m2').textContent = '~$22T'; }

    /* commodities */
    const commos = [
      {n:'Gold',s:'GC=F',p:'$'},{n:'Silver',s:'SI=F',p:'$'},{n:'Copper',s:'HG=F',p:'$'},
      {n:'Brent Crude',s:'BZ=F',p:'$'},{n:'Natural Gas',s:'NG=F',p:'$'},
      {n:'Coffee',s:'KC=F',p:'$'},{n:'Cocoa',s:'CC=F',p:'$'}
    ];
    const tb = $('commodity-tbody'); tb.innerHTML = '';
    for (const c of commos) {
      const d = await window.NCF.fetchYahoo(c.s, '5d');
      if (!d) continue;
      const dir = d.pct >= 0 ? 'up' : 'dn';
      const tr = document.createElement('tr'); tr.className = 'cal-row';
      tr.innerHTML = '<td>' + c.n + '</td><td class="mono">' + c.p + d.last.toLocaleString('en-US', {maximumFractionDigits: 2}) +
        '</td><td><span class="badge ' + dir + '">' + (d.pct >= 0 ? '+' : '') + d.pct.toFixed(2) + '%</span></td>' +
        '<td style="width:120px">' + window.NCF.sparkline(d.closes, d.pct >= 0) + '</td>';
      tb.appendChild(tr);
      if (c.s === 'GC=F') window.NCF.paint('gold', d.last, d.pct);
      if (c.s === 'BZ=F') window.NCF.paint('brent', d.last, d.pct);
    }
    if (!tb.hasChildNodes()) tb.innerHTML = '<tr><td colspan="4" class="muted" style="text-align:center;padding:20px">Data unavailable.</td></tr>';

    /* BTC for ticker */
    const cg = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd&include_24hr_change=true').then(r => r.json()).catch(() => null);
    if (cg && cg.bitcoin) window.NCF.paint('btc', cg.bitcoin.usd, cg.bitcoin.usd_24h_change);
  }
  loadMacro();
  setInterval(loadMacro, 5 * 60 * 1000);
</script>
